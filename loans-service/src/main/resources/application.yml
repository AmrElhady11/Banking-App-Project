spring:
  application:
    name: loans-service
  datasource:
    url: ${LOANS-SERV-URL}
    username: ${LOANS-SERV-USERNAME}
    password: ${LOANS-SERV-PASSWORD}
    driver-class-name: org.postgresql.Driver
    jpa:
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          ddl-auto: update
  management:
    endpoints:
      web:
        exposure:
          include: "env"